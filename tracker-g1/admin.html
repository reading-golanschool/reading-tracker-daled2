<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח בקרה - נבחרת הקריאה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
        }

        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .progress-bar-container {
            background: #f0f0f0;
            border-radius: 50px;
            height: 40px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 50px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .students-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .student-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .student-card.reported {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .student-card .student-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .student-card .student-status {
            font-size: 0.9em;
            color: #666;
        }

        .reports-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .reports-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .reports-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: 600;
        }

        .reports-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            text-align: right;
        }

        .reports-table tr:hover {
            background: #f8f9fa;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .export-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-right: 10px;
        }

        .export-btn:hover {
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.5em;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .section-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .reports-table {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 לוח בקרה - נבחרת הקריאה 📚</h1>
            <p>כיתה ג1' - מעקב ונתונים בזמן אמת</p>
        </div>

        <button class="refresh-btn" onclick="loadData()">🔄 רענון נתונים</button>
        <button class="export-btn" onclick="exportToExcel()">📊 ייצוא לאקסל</button>

        <div id="loading" class="loading">טוען נתונים...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="content" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-value" id="totalMinutes">0</div>
                    <div class="stat-label">סה"כ דקות השבוע</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value" id="totalReports">0</div>
                    <div class="stat-label">דיווחים השבוע</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="activeStudents">0</div>
                    <div class="stat-label">תלמידים פעילים</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎯</div>
                    <div class="stat-value" id="participationRate">0%</div>
                    <div class="stat-label">אחוז השתתפות</div>
                </div>
            </div>

            <div class="progress-section">
                <h2 class="section-title">התקדמות לעומת יעד השבועי</h2>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%;">
                        <span id="progressText">0%</span>
                    </div>
                </div>
                <p style="text-align: center; color: #666; margin-top: 10px;">
                    יעד: <strong id="weeklyGoal">300</strong> דקות | השגנו: <strong id="achievedMinutes">0</strong> דקות
                </p>
            </div>

            <div class="students-section">
                <h2 class="section-title">מעקב אישי אחר תלמידים</h2>
                <div class="student-grid" id="studentGrid"></div>
            </div>

            <div class="reports-section">
                <h2 class="section-title">דיווחים אחרונים</h2>
                <div style="overflow-x: auto;">
                    <table class="reports-table">
                        <thead>
                            <tr>
                                <th>תאריך</th>
                                <th>שעה</th>
                                <th>שם</th>
                                <th>מה קרא/ה</th>
                                <th>איך הרגיש/ה</th>
                                <th>רגע AHA</th>
                            </tr>
                        </thead>
                        <tbody id="reportsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // הגדרות
        const SHEET_ID = '1Md5UPiPtMs-q_ZHXke54neZ6pWZj5V8wwEK7r6o5tFc';
        const SHEET_NAME = 'דיווחים';
        const API_KEY = 'AIzaSyBFbxtuwI1KYCgyA7QA-RxFMOOdxNi84rc';
        const WEEKLY_GOAL = 300;

        // רשימת כל התלמידים
        const ALL_STUDENTS = [
  'אביגיל בן אבי',
  'אדם ברגר',
  'אופיר זיו',
  'אופיר כהנים',
  'אופיר שמאלוב',
  'אמילי סנדלר',
  'ארז פריטש-רייף',
  'בר רוזן',
  'גיא אליהו',
  'היילי פלקסי',
  'יהונתן פלד',
  'לי ניב',
  'ליאור קריבושי',
  'ליה רון',
  'מיה טמבור',
  'מיה פרל',
  'נטע ורון',
  'נינה מירקין',
  'עידו אביטל',
  'פלג אילוז הורוביץ',
  'רוי בר לב',
  'רוי גינדי לוי',
  'שחר מאורי'
];

        let allReports = [];

        // טעינת נתונים מ-Google Sheets
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('content');

            loading.style.display = 'block';
            error.style.display = 'none';
            content.style.display = 'none';

            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('שגיאה בטעינת הנתונים. אנא בדוק את הגדרות ה-API Key וה-Sheet ID.');
                }

                const data = await response.json();
                const rows = data.values || [];

                if (rows.length < 2) {
                    throw new Error('אין נתונים בגיליון עדיין.');
                }

                // המרת הנתונים
                allReports = rows.slice(1).map(row => ({
                    timestamp: row[0] || '',
                    date: row[1] || '',
                    time: row[2] || '',
                    student: row[3] || '',
                    material: row[4] || '',
                    feeling: row[5] || '',
                    aha: row[6] || '',
                    minutes: parseInt(row[7]) || 10
                })).filter(report => report.student); // סינון שורות ריקות

                // עדכון התצוגה
                updateDashboard();
                loading.style.display = 'none';
                content.style.display = 'block';

            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = '❌ ' + err.message;
                console.error('Error:', err);
            }
        }

        // עדכון לוח הבקרה
        function updateDashboard() {
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            // סינון דיווחים מהשבוע האחרון
            const weeklyReports = allReports.filter(report => {
                const reportDate = parseDate(report.date);
                return reportDate >= weekAgo;
            });

            // חישוב סטטיסטיקות
            const totalMinutes = weeklyReports.reduce((sum, r) => sum + r.minutes, 0);
            const totalReports = weeklyReports.length;
            const uniqueStudents = new Set(weeklyReports.map(r => r.student));
            const activeStudents = uniqueStudents.size;
            const participationRate = Math.round((activeStudents / ALL_STUDENTS.length) * 100);

            // עדכון כרטיסי סטטיסטיקה
            document.getElementById('totalMinutes').textContent = totalMinutes;
            document.getElementById('totalReports').textContent = totalReports;
            document.getElementById('activeStudents').textContent = activeStudents;
            document.getElementById('participationRate').textContent = participationRate + '%';

            // עדכון פס התקדמות
            const progress = Math.min(100, Math.round((totalMinutes / WEEKLY_GOAL) * 100));
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress + '%';
            document.getElementById('achievedMinutes').textContent = totalMinutes;
            document.getElementById('weeklyGoal').textContent = WEEKLY_GOAL;

            // עדכון רשת התלמידים
            updateStudentGrid(uniqueStudents);

            // עדכון טבלת דיווחים
            updateReportsTable(allReports.slice(0, 20)); // 20 דיווחים אחרונים
        }

        // עדכון רשת התלמידים
        function updateStudentGrid(reportedStudents) {
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';

            ALL_STUDENTS.forEach(student => {
                const reported = reportedStudents.has(student);
                const card = document.createElement('div');
                card.className = 'student-card' + (reported ? ' reported' : '');
                card.innerHTML = `
                    <div class="student-name">${student}</div>
                    <div class="student-status">${reported ? '✅ דיווח השבוע' : '⏳ ממתין לדיווח'}</div>
                `;
                grid.appendChild(card);
            });
        }

        // עדכון טבלת דיווחים
        function updateReportsTable(reports) {
            const tbody = document.getElementById('reportsTable');
            tbody.innerHTML = '';

            reports.forEach(report => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${report.date}</td>
                    <td>${report.time}</td>
                    <td><strong>${report.student}</strong></td>
                    <td>${report.material}</td>
                    <td>${getFeelingText(report.feeling)}</td>
                    <td>${report.aha || '-'}</td>
                `;
            });
        }

        // המרת תחושה לטקסט
        function getFeelingText(feeling) {
            const feelings = {
                'easy': '💪 הלך חלק',
                'hard': '😓 היה קשה',
                'flow': '🚀 זרימה מלאה'
            };
            return feelings[feeling] || feeling;
        }

        // המרת תאריך
        function parseDate(dateStr) {
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return new Date(parts[2], parts[1] - 1, parts[0]);
            }
            return new Date(dateStr);
        }

        // ייצוא לאקסל
        function exportToExcel() {
            const csv = convertToCSV(allReports);
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `reading_reports_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // המרה ל-CSV
        function convertToCSV(data) {
            const headers = ['תאריך', 'שעה', 'שם', 'מה קרא/ה', 'איך הרגיש/ה', 'רגע AHA', 'דקות'];
            const rows = data.map(r => [r.date, r.time, r.student, r.material, getFeelingText(r.feeling), r.aha, r.minutes]);
            return [headers, ...rows].map(row => row.join(',')).join('\n');
        }

        // טעינה אוטומטית בטעינת הדף
        window.onload = loadData;

        // רענון אוטומטי כל 5 דקות
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
