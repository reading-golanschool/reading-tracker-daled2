<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נבחרת הקריאה - כיתה ה'</title>
    <link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<<meta name="apple-mobile-web-app-title" content="דיווח קריאה">
<meta name="theme-color" content="#FF6B6B">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="logo">🧠💪</div>
            <h1>נבחרת הקריאה של כיתה ה'</h1>
            <p class="subtitle">חדר כושר למוח</p>
        </header>

        <!-- Stats Banner -->
        <div class="stats-banner">
            <div class="stat-item">
                <div class="stat-number" id="totalMinutes">0</div>
                <div class="stat-label">דקות השבוע</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="todayReaders">0</div>
                <div class="stat-label">אימנו היום</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="weeklyGoal">300</div>
                <div class="stat-label">יעד השבוע</div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <!-- Main Form -->
        <div class="form-container">
            <h2>📝 דיווח אימון יומי</h2>
            <p class="form-description">סימנת את אימון ה-10 דקות היום? מעולה! דווח/י עכשיו!</p>

            <form id="readingForm">
                <!-- Student Name -->
                <div class="form-group">
                    <label for="studentName">🙋‍♂️ מה שמך?</label>
                    <select id="studentName" name="studentName" required>
                    <option value="">בחר/י את שמך</option>
                    <option value="איתמר אביטל">איתמר אביטל</option>
<option value="מאיה אזרזר">מאיה אזרזר</option>
<option value="אלון פנחס בכר">אלון פנחס בכר</option>
<option value="גילי בן סימון">גילי בן סימון</option>
<option value="סאשה צ'ארלי גולדשטיין">סאשה צ'ארלי גולדשטיין</option>
<option value="גאיה גל און">גאיה גל און</option>
<option value="רפאל גלפנד">רפאל גלפנד</option>
<option value="אור גפן">אור גפן</option>
<option value="אדם דודאי">אדם דודאי</option>
<option value="הילה שירה דורון">הילה שירה דורון</option>
<option value="דניאל הירש">דניאל הירש</option>
<option value="מיכאלה הראל">מיכאלה הראל</option>
<option value="עילאי ווייס">עילאי ווייס</option>
<option value="יונתן דוד טייבר">יונתן דוד טייבר</option>
<option value="בר כהן">בר כהן</option>
<option value="דניאל יהושע לבנשטיין">דניאל יהושע לבנשטיין</option>
<option value="שחר שמחה לוי">שחר שמחה לוי</option>
<option value="דן מינצר בונה">דן מינצר בונה</option>
<option value="בילי פדה">בילי פדה</option>
<option value="ליאן זרי פוזנר">ליאן זרי פוזנר</option>
<option value="יובל פולג">יובל פולג</option>
<option value="איתן פורר">איתן פורר</option>
<option value="גיא דוד פורר">גיא דוד פורר</option>
<option value="אלון יונתן קורדובה">אלון יונתן קורדובה</option>
<option value="איתמר קרביץ">איתמר קרביץ</option>
<option value="אמה קשמיר">אמה קשמיר</option>
<option value="עומרי שמעוני">עומרי שמעוני</option>
<option value="אביתר שמשינס">אביתר שמשינס</option>
                        <!-- Add all student names here -->
                    </select>
                </div>

                <!-- What did you read -->
                <div class="form-group">
                    <label for="readingMaterial">📚 מה קראת היום?</label>
                    <input type="text" id="readingMaterial" name="readingMaterial" 
                           placeholder="שם הספר / כתבה / קומיקס" required>
                </div>

                <!-- How did it feel -->
                <div class="form-group">
                    <label>💭 איך הרגשת באימון?</label>
                    <div class="feeling-options">
                        <label class="feeling-card">
                            <input type="radio" name="feeling" value="easy" required>
                            <div class="feeling-content">
                                <div class="feeling-emoji">💪</div>
                                <div class="feeling-text">הלך חלק</div>
                            </div>
                        </label>
                        <label class="feeling-card">
                            <input type="radio" name="feeling" value="hard" required>
                            <div class="feeling-content">
                                <div class="feeling-emoji">😓</div>
                                <div class="feeling-text">היה קשה</div>
                            </div>
                        </label>
                        <label class="feeling-card">
                            <input type="radio" name="feeling" value="flow" required>
                            <div class="feeling-content">
                                <div class="feeling-emoji">🚀</div>
                                <div class="feeling-text">הייתי בזרימה!</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Optional AHA moment -->
                <div class="form-group">
                    <label for="ahaмомент">💡 רגע AHA! (אופציונלי)</label>
                    <textarea id="ahaMoment" name="ahaMoment" 
                              placeholder="משהו מעניין שקרה בקריאה? דמות שאהבת? רעיון מגניב?"></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">🎯 שלח דיווח ותרום 10 דקות!</span>
                </button>
            </form>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
            <div class="success-content">
                <div class="success-icon">🎉</div>
                <h2>כל הכבוד!</h2>
                <p>תרמת <strong>10 דקות</strong> לנבחרת!</p>
                <p class="success-subtitle">המורה תעדכן את לוח התוצאות בקרוב.</p>
                <button class="close-btn" onclick="closeSuccessMessage()">סגור</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>💪 כל אימון מחזק אותנו! 📚</p>
            <p class="footer-small">נבחרת הקריאה - כיתה ה'</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
